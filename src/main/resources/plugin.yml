name: Fundamentals
version: ${project.version}
main: io.github.keirenw.fundamentals.Fundamentals
api-version: 1.13
authors: [Keiren_Waddell]

commands:
  ping:
    description: Pong!
    usage: /ping
  pong:
    description: We know ;)
    usage: /pong
  sethome:
    description: Set a home that you can teleport back to
    usage: /sethome [name]
  home:
    description: Teleport home
    usage: /home [name]
  slap:
    description: Slap a bitch
    usage: /slap [name]
    permission: fundamentals.slap
    permission-message: You don't have permssion to use this command

permissions:
  fundamentals.slap:
    description: Allows you to slap a bitch.
    default: op
